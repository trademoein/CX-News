name: Forward Telegram to Bale

on:
  schedule:
    - cron: '*/5 * * * *'   # هر 5 دقیقه
  workflow_dispatch:

concurrency:
  group: forward-bot
  cancel-in-progress: false

jobs:
  forward:
    runs-on: ubuntu-latest
    permissions:
      contents: write         # برای commit state.json روی شاخه state

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install telethon aiohttp   # ← اضافه کردن aiohttp

      - name: Restore state from git branch (without switching)
        run: |
          git fetch origin state:state || true
          if git rev-parse --verify refs/heads/state >/dev/null 2>&1; then
            git show state:state.json > state.json 2>/dev/null || echo "{}" > state.json
          else
            echo "{}" > state.json
          fi

      - name: Run bot
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          DC_ID: ${{ secrets.DC_ID }}
          AUTH_KEY_HEX: ${{ secrets.AUTH_KEY_HEX }}
          USER_ID: ${{ secrets.USER_ID }}
          SOURCE_CHANNELS: ${{ secrets.SOURCE_CHANNELS }}
          BALE_BOT_TOKEN: ${{ secrets.BALE_BOT_TOKEN }}
          BALE_CHANNEL_ID: ${{ secrets.BALE_CHANNEL_ID }}
          ADMIN_TELEGRAM_ID: ${{ secrets.ADMIN_TELEGRAM_ID }}   # اگر اضافه کرده‌اید
        run: python main.py

      - name: Commit updated state
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp state.json /tmp/updated_state.json
          rm -f state.json
          git checkout state || git checkout -b state
          cp /tmp/updated_state.json state.json
          git add state.json
          git commit -m "Update state [skip ci]" || echo "No changes to commit"
          git push origin state
          git checkout main
