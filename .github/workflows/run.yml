name: Forward Telegram to Bale

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

concurrency:
  group: forward-bot
  cancel-in-progress: false

jobs:
  forward:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install telethon requests

      - name: Restore state from git branch
        run: |
          git fetch origin state:state || true
          if git show-ref --verify refs/heads/state; then
            git checkout state
          else
            git checkout -b state
          fi
          # اگر فایل state.json در شاخه state هست، آن را به ریشه پروژه (دایرکتوری اصلی) کپی کن
          if [ -f state.json ]; then
            cp state.json $GITHUB_WORKSPACE/state.json
          else
            echo "{}" > $GITHUB_WORKSPACE/state.json
          fi
          git checkout main

      - name: Run bot
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          DC_ID: ${{ secrets.DC_ID }}
          AUTH_KEY_HEX: ${{ secrets.AUTH_KEY_HEX }}
          USER_ID: ${{ secrets.USER_ID }}
          SOURCE_CHANNELS: ${{ secrets.SOURCE_CHANNELS }}
          BALE_BOT_TOKEN: ${{ secrets.BALE_BOT_TOKEN }}
          BALE_CHANNEL_ID: ${{ secrets.BALE_CHANNEL_ID }}
        run: python main.py

      - name: Commit updated state
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # از ریشه پروژه state.json را به شاخه state منتقل کن
          git fetch origin state:state || true
          git checkout state || git checkout -b state
          cp $GITHUB_WORKSPACE/state.json .
          git add state.json
          git commit -m "Update state [skip ci]" || echo "No changes to commit"
          git push origin state
