name: Forward Telegram to Bale

on:
  schedule:
    - cron: '*/5 * * * *'   # هر 5 دقیقه
  workflow_dispatch:

concurrency:
  group: forward-bot
  cancel-in-progress: false   # اجازه ندهید اجرای جدید، قبلی را متوقف کند

jobs:
  forward:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # برای commit state روی شاخه state
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # برای دسترسی به تمام شاخه‌ها

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install telethon requests

      - name: Restore state from git branch
        run: |
          git fetch origin state:state || true
          git checkout state || git checkout --orphan state
          # اگر state.json وجود دارد، آن را به پوشه اصلی بیاور
          if [ -f state.json ]; then
            cp state.json ./
          else
            echo "{}" > state.json
          fi
          git checkout main   # برگرد به شاخه اصلی برای اجرای کد

      - name: Run bot
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          DC_ID: ${{ secrets.DC_ID }}
          AUTH_KEY_HEX: ${{ secrets.AUTH_KEY_HEX }}
          USER_ID: ${{ secrets.USER_ID }}
          SOURCE_CHANNELS: ${{ secrets.SOURCE_CHANNELS }}
          BALE_BOT_TOKEN: ${{ secrets.BALE_BOT_TOKEN }}
          BALE_CHANNEL_ID: ${{ secrets.BALE_CHANNEL_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python main.py

      - name: Commit updated state
        if: always()   # حتی اگر خطا داشت، state ذخیره شود
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout state || git checkout --orphan state
          cp state.json .
          git add state.json
          git commit -m "Update state [skip ci]" || echo "No changes to commit"
          git push origin state
