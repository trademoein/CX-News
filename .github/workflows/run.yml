name: Forward Telegram to Bale

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

concurrency:
  group: forward-bot
  cancel-in-progress: false

jobs:
  forward:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install telethon requests

      - name: Restore state from git branch (without switching branch)
        run: |
          # دریافت آخرین تغییرات شاخه state
          git fetch origin state:state || true
          # اگر فایل state.json در شاخه state وجود دارد، آن را در ریشه پروژه ذخیره کن
          if git rev-parse --verify refs/heads/state >/dev/null 2>&1; then
            git show state:state.json > state.json 2>/dev/null || echo "{}" > state.json
          else
            echo "{}" > state.json
          fi

      - name: Run bot
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          DC_ID: ${{ secrets.DC_ID }}
          AUTH_KEY_HEX: ${{ secrets.AUTH_KEY_HEX }}
          USER_ID: ${{ secrets.USER_ID }}
          SOURCE_CHANNELS: ${{ secrets.SOURCE_CHANNELS }}
          BALE_BOT_TOKEN: ${{ secrets.BALE_BOT_TOKEN }}
          BALE_CHANNEL_ID: ${{ secrets.BALE_CHANNEL_ID }}
        run: python main.py

      - name: Commit updated state
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # برو به شاخه state
          git checkout state || git checkout -b state
          # فایل state.json را از شاخه اصلی (قبلی) به اینجا بیاور
          cp "$GITHUB_WORKSPACE/state.json" .
          git add state.json
          git commit -m "Update state [skip ci]" || echo "No changes to commit"
          git push origin state
          # برگرد به شاخه اصلی برای اجراهای بعدی (اختیاری)
          git checkout main
