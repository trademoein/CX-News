name: Forward Telegram to Bale

on:
  schedule:
    - cron: '*/13 * * * *'   # اجرا هر ۱۳ دقیقه (کاهش شانس تاخیر)
  workflow_dispatch:

concurrency:
  group: forward-bot
  cancel-in-progress: true   # اجرای جدید، اجرای قبلی را لغو می‌کند

jobs:
  forward:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install telethon requests

      - name: Restore state from git branch (without switching)
        run: |
          git fetch origin state:state || true
          if git rev-parse --verify refs/heads/state >/dev/null 2>&1; then
            git show state:state.json > state.json 2>/dev/null || echo "{}" > state.json
          else
            echo "{}" > state.json
          fi

      - name: Run bot
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          DC_ID: ${{ secrets.DC_ID }}
          AUTH_KEY_HEX: ${{ secrets.AUTH_KEY_HEX }}
          USER_ID: ${{ secrets.USER_ID }}
          SOURCE_CHANNELS: ${{ secrets.SOURCE_CHANNELS }}
          BALE_BOT_TOKEN: ${{ secrets.BALE_BOT_TOKEN }}
          BALE_CHANNEL_ID: ${{ secrets.BALE_CHANNEL_ID }}
        run: python main.py

      - name: Commit updated state
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # ذخیره state.json به‌روز شده در یک مکان موقت
          cp state.json /tmp/updated_state.json
          # حذف فایل state.json برای جلوگیری از تداخل هنگام checkout
          rm -f state.json
          # رفتن به شاخه state (ایجاد اگر نباشد)
          git checkout state || git checkout -b state
          # برگرداندن فایل به‌روز شده
          cp /tmp/updated_state.json state.json
          git add state.json
          git commit -m "Update state [skip ci]" || echo "No changes to commit"
          git push origin state
          # برگشت به شاخه اصلی (برای اجراهای بعدی)
          git checkout main
